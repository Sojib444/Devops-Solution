services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: userservice-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong@Pass123"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "YourStrong@Pass123" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  userservice-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: userservice-api
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ASPNETCORE_ENVIRONMENT: "Docker"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=UserServiceDb;User Id=sa;Password=YourStrong@Pass123;TrustServerCertificate=True;"
    depends_on:
      sqlserver:
        condition: service_healthy

volumes:
  sqlserver-data:
